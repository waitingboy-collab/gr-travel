        h2 { text-align: center; color: #0275d8; margin-top: 5px; margin-bottom: 25px; }
        .lang-group { display: flex; align-items: center; justify-content: flex-end; margin-bottom: 15px; gap: 8px; }
        .lang-select { width: auto; padding: 6px 10px; margin-bottom: 0; font-size: 14px; border: 1px solid #cbd5e1; border-radius: 6px; background-color: #fff; cursor: pointer; }
        .input-group { background: #eff6ff; padding: 15px; margin-bottom: 20px; border-radius: 6px; border: 1px solid #bfdbfe; }
        .section-title { font-size: 16px; font-weight: bold; color: #1e3a8a; border-bottom: 2px solid #3b82f6; padding-bottom: 5px; margin-bottom: 15px; }
        .segment { background: #fff; padding: 12px; margin-bottom: 12px; border: 1px solid #e5e7eb; border-radius: 6px; border-left: 4px solid #3b82f6; }
        .segment h4 { margin: 0 0 8px 0; color: #1e40af; font-size: 14px; }
        label { display: block; font-size: 13px; margin-bottom: 3px; font-weight: bold; color: #4b5563; }
        input, select { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 15px; }
        .calc-btn { width: 100%; padding: 15px; background-color: #0275d8; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .gps-btn { width: 100%; padding: 12px; background-color: #10b981; color: white; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; font-weight: bold; margin-bottom: 15px; }
        #results { margin-top: 25px; padding: 18px; border-radius: 6px; display: block; line-height: 1.6; }
        .success { background-color: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
        .warning-box { color: #991b1b; background-color: #fef2f2; border: 1px solid #fca5a5; padding: 10px; border-radius: 4px; margin-top: 12px; font-weight: bold; }
        optgroup { font-weight: bold; color: #1e3a8a; background: #f8fafc; }
        option { font-weight: normal; color: #333; }
    </style>
</head>

            <option value="ru">Русский (RU)</option>

    </div>

    </div>
    
    <div class="section-title" id="sec-title">Маршрут в Гърция</div>
    <div id="gr-segments-container"></div>

function findDestination(key) {
    for (let group in destinationsDatabase) {
        if (destinationsDatabase[group][key]) {
            return destinationsDatabase[group][key];
        }
    }
    return null;
}

function getGPSLocation() {
    const t = translations[currentLang];
    if (!navigator.geolocation) {
        alert(t.gpsNoSupport);
        return;
    }
    alert(t.gpsStart);
    navigator.geolocation.getCurrentPosition(
        function(position) {
            const distanceRoad = 71;
            alert(t.gpsSuccess + distanceRoad + " км.");
        },
        function(error) {
            alert(t.gpsErr + error.message);
        }
    );
}

function changeLanguage() {
    const langSelect = document.getElementById("lang-select");
    if (!langSelect) return;
    currentLang = langSelect.value;
    
    // Смяна на статичните текстове
    const t = translations[currentLang];
    document.getElementById("lbl-lang").innerText = t.lblLang;
    document.getElementById("lbl-dep-time").innerText = t.lblDepTime;
    document.getElementById("gps-btn-text").innerText = t.gpsBtn;
    document.getElementById("lbl-consumption").innerText = t.lblConsumption;
    document.getElementById("lbl-price").innerText = t.lblPrice;
    document.getElementById("lbl-destination").innerText = t.lblDestination;
    document.getElementById("sec-title").innerText = t.secTitle;
    document.getElementById("calc-btn-text").innerText = t.btnText;

    // Презареждане на базата и интерфейса
    populateDestinations();
    buildSegmentInputs();
    calculateGreeceTrip();
}

function populateDestinations() {
    const select = document.getElementById("destination-select");
    if (!select) return;
    select.innerHTML = "";
    
    const t = translations[currentLang];
    
    for (let group in destinationsDatabase) {
        let optGroup = document.createElement("optgroup");
        optGroup.label = t[group] || group; 
        
        for (let key in destinationsDatabase[group]) {
            let opt = document.createElement("option");
            opt.value = key;
            opt.innerText = destinationsDatabase[group][key][currentLang];
            if (key === selectedDestKey) opt.selected = true;
            optGroup.appendChild(opt);
        }
        select.appendChild(optGroup);
    }
}

function updateDestination() {
    const select = document.getElementById("destination-select");
    if (!select) return;
    selectedDestKey = select.value;
    buildSegmentInputs();
    calculateGreeceTrip();
}

function buildSegmentInputs() {
    const container = document.getElementById("gr-segments-container");
    if (!container) return;
    const t = translations[currentLang];
    const dest = findDestination(selectedDestKey);
    if (!dest) return;

    let html = `
        <div class="segment">
            <h4>📍 ${t.segMakaza} (${t.lblLimit}: 90)</h4>
            <label>${t.lblDist}</label>
            <input type="number" id="gr_makaza-dist" value="24.5" step="0.1" oninput="calculateGreeceTrip()">
            <label>${t.lblSpeed}</label>
            <input type="number" id="gr_makaza-speed" value="80" oninput="calculateGreeceTrip()">
        </div>
    `;

    if (dest.hasHighway) {
        html += `
            <div class="segment" style="border-left-color: #eab308;">
                <h4>🛣️ ${t.segHighway} (${t.lblLimit}: ${dest.highwayAllowed})</h4>
                <label>${t.lblDist}</label>
                <input type="number" id="gr_highway-dist" value="${dest.highwayDist}" step="0.1" oninput="calculateGreeceTrip()">
                <label>${t.lblSpeed}</label>
                <input type="number" id="gr_highway-speed" value="${dest.highwaySpeed}" oninput="calculateGreeceTrip()">
            </div>
        `;
    }

    html += `
        <div class="segment" style="border-left-color: #10b981;">
            <h4>📍 ${t.segLocal} ➔ ${dest[currentLang]} (${t.lblLimit}: ${dest.localAllowed})</h4>
            <label>${t.lblDist}</label>
            <input type="number" id="gr_local-dist" value="${dest.localDist}" step="0.1" oninput="calculateGreeceTrip()">
            <label>${t.lblSpeed}</label>
            <input type="number" id="gr_local-speed" value="${dest.localSpeed}" oninput="calculateGreeceTrip()">
        </div>
    `;

    container.innerHTML = html;
}

function addMinutesToTime(baseHours, baseMinutes, addedMinutes) {
    let totalMin = baseMinutes + Math.round(addedMinutes);
    let totalHr = baseHours + Math.floor(totalMin / 60);
    totalMin = totalMin % 60;
    totalHr = totalHr % 24;
    return `${String(totalHr).padStart(2, '0')}:${String(totalMin).padStart(2, '0')}`;
}

function calculateGreeceTrip() {
    const t = translations[currentLang];
    const dest = findDestination(selectedDestKey);
    if (!dest) return;

    const depTimeInput = document.getElementById("departure-time");
    if (!depTimeInput || !depTimeInput.value) return;
    
    const [depHours, depMinutes] = depTimeInput.value.split(":").map(Number);
    const fuelConsumption = parseFloat(document.getElementById("fuel-consumption").value) || 0;
    const fuelPriceEUR = parseFloat(document.getElementById("fuel-price-eur").value) || 0;

    let totalTime = 0;
    let totalDistance = 0;
    let speedWarning = false;

    const mDistInput = document.getElementById("gr_makaza-dist");
    const mSpeedInput = document.getElementById("gr_makaza-speed");
    if (mDistInput && mSpeedInput) {
        const mDist = parseFloat(mDistInput.value) || 0;
        const mSpeed = parseFloat(mSpeedInput.value) || 0;
        if (mDist > 0 && mSpeed > 0) {
            totalTime += mDist / mSpeed;
            totalDistance += mDist;
            if (mSpeed > 90) speedWarning = true;
        }
    }

    const hDistInput = document.getElementById("gr_highway-dist");
    const hSpeedInput = document.getElementById("gr_highway-speed");
    if (dest.hasHighway && hDistInput && hSpeedInput) {
        const hDist = parseFloat(hDistInput.value) || 0;
        const hSpeed = parseFloat(hSpeedInput.value) || 0;
        if (hDist > 0 && hSpeed > 0) {
            totalTime += hDist / hSpeed;
            totalDistance += hDist;
            if (hSpeed > dest.highwayAllowed) speedWarning = true;
        }
    }

    const lDistInput = document.getElementById("gr_local-dist");
    const lSpeedInput = document.getElementById("gr_local-speed");
    if (lDistInput && lSpeedInput) {
        const lDist = parseFloat(lDistInput.value) || 0;
        const lSpeed = parseFloat(lSpeedInput.value) || 0;
        if (lDist > 0 && lSpeed > 0) {
            totalTime += lDist / lSpeed;
            totalDistance += lDist;
            if (lSpeed > dest.localAllowed) speedWarning = true;
        }
    }

    let totalFuelLitres = (totalDistance * fuelConsumption) / 100;
    let totalFuelCostEUR = totalFuelLitres * fuelPriceEUR;
    let totalFuelCostBGN = totalFuelCostEUR * 1.95583;

    const arrivalTimeFormatted = addMinutesToTime(depHours, depMinutes, totalTime * 60);
    const totalDurationMinutes = totalTime * 60;
    const durationHours = Math.floor(totalDurationMinutes / 60);
    const durationMinutes = Math.round(totalDurationMinutes % 60);

    let resultsHTML = `
        <h3>${t.resTitle}</h3>
        <p style="font-size: 17px;"><strong>${t.resArrival} <span style="color: #0275d8;">${arrivalTimeFormatted} ${t.hoursStr}</span></strong></p>
        <p><strong>${t.resDist}</strong> ${totalDistance.toFixed(1)} км</p>
        <p><strong>${t.resTime}</strong> ${durationHours} ${t.hoursStr} ${durationMinutes} ${t.minStr}</p>
        <hr style="border: 0; border-top: 1px solid #cbd5e1; margin: 12px 0;">
        <p>${t.resFuel} ${totalFuelLitres.toFixed(2)} л</p>
        <p style="font-size: 16px;"><strong>${t.resPrice} <span style="color: #10b981;">${totalFuelCostEUR.toFixed(2)} €</span> (${totalFuelCostBGN.toFixed(2)} лв.)</strong></p>
    `;

    if (speedWarning) {
        resultsHTML += `<div class="warning-box">${t.warning}</div>`;
    }

    const resultsDiv = document.getElementById("results");
    if (resultsDiv) {
        resultsDiv.innerHTML = resultsHTML;
    }
}

// Първоначално зареждане
populateDestinations();
buildSegmentInputs();
calculateGreeceTrip();
</script>
</body>
</html>
